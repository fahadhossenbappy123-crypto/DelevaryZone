{% extends 'shop/base.html' %}
{% block title %}Service Zone Map - ZoneDelivery{% endblock %}

{% block extra_css %}
<style>
    /* Mobile responsive map container */
    @media (max-width: 768px) {
        .map-container {
            margin: 0 !important;
            height: 100vh !important;
        }
        
        #statusPanel {
            min-width: 250px !important;
            width: 90% !important;
            bottom: 10px !important;
            right: 5% !important;
            left: auto !important;
        }
    }
    
    @media (max-width: 576px) {
        .map-container {
            margin: 0 !important;
            height: 100vh !important;
        }
        
        #statusPanel {
            min-width: auto !important;
            width: 95% !important;
            bottom: 10px !important;
            right: 2.5% !important;
            left: auto !important;
            padding: 15px !important;
        }
        
        #topBar {
            padding: 10px !important;
        }
        
        #topBar h5 {
            font-size: 1rem !important;
        }
        
        #topBar small {
            font-size: 0.8rem !important;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="map-container" style="height: 100vh; display: flex; flex-direction: column; margin: -4rem -4rem -2rem -4rem;">
    
    <!-- Top Bar -->
    <div id="topBar" style="padding: 15px; background: white; border-bottom: 1px solid #ddd; flex-shrink: 0;">
        <h5 class="mb-0">📍 Service Zone Checker</h5>
        <small class="text-muted">Get your location and check delivery availability</small>
    </div>

    <!-- Google Map -->
    <div id="map" style="flex: 1; width: 100%; overflow: hidden;"></div>

    <!-- Status Panel -->
    <div id="statusPanel" style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        padding: 20px;
        min-width: 300px;
        z-index: 1000;
    ">
        <div class="text-center">
            <div class="spinner-border spinner-border-sm text-primary"></div>
            <p class="mt-2 mb-0 text-muted small">Getting your location...</p>
        </div>
    </div>
</div>

<!-- Google Maps API -->
<script>
    // Check if API key exists
    const googleMapsApiKey = '{{ google_maps_api_key }}';
    if (!googleMapsApiKey || googleMapsApiKey.trim() === '') {
        document.addEventListener('DOMContentLoaded', function() {
            const statusPanel = document.getElementById('statusPanel');
            if (statusPanel) {
                statusPanel.innerHTML = `
                    <div class="alert alert-danger mb-0">
                        <strong>❌ Configuration Error</strong>
                        <p class="mb-0 mt-2">Google Maps API key not configured. Please contact support.</p>
                    </div>
                `;
            }
        });
    }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places" async defer></script>

<script>
let map;
let userMarker = null;
let selectedMarker = null;
let zoneCircles = [];
let infoWindows = [];
let mapReady = false;

function initMap() {
    const dhaka = {lat: 23.8103, lng: 90.2506};
    
    try {
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 13,
            center: dhaka,
            mapTypeId: 'roadmap',
            fullscreenControl: true,
            zoomControl: true,
            mapTypeControl: false,
            streetViewControl: false
        });
        
        mapReady = true;
        
        // Add map click listener
        map.addListener('click', function(e) {
            selectLocationFromMapClick(e.latLng);
        });
        
        fetchZones();
        checkLocation();
    } catch (error) {
        console.error('Map initialization error:', error);
        showStatus('❌ Failed to load Google Maps. Please check API key and try again.', 'danger');
    }
}

function selectLocationFromMapClick(latLng) {
    const lat = latLng.lat();
    const lng = latLng.lng();
    
    // Remove old selected marker
    if (selectedMarker) {
        selectedMarker.setMap(null);
    }
    
    // Add new marker at clicked location
    selectedMarker = new google.maps.Marker({
        position: latLng,
        map: map,
        title: 'Selected Location',
        icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
    });
    
    // Check if location is in any service zone
    checkServiceZone(lat, lng);
}

function fetchZones() {
    fetch('/api/zones/')
        .then(res => res.json())
        .then(data => {
            drawZones(data.zones || []);
        })
        .catch(err => {
            console.error('Error fetching zones:', err);
            showStatus('❌ Failed to load zones', 'danger');
        });
}

function drawZones(zones) {
    if (!zones || zones.length === 0) {
        showStatus('⚠️ No service zones available', 'warning');
        return;
    }
    
    zones.forEach(zone => {
        const circle = new google.maps.Circle({
            map: map,
            center: {lat: zone.latitude, lng: zone.longitude},
            radius: zone.radius,
            fillColor: '#52C77B',
            fillOpacity: 0.1,
            strokeColor: '#52C77B',
            strokeWeight: 2,
            clickable: true
        });
        
        const infoWindow = new google.maps.InfoWindow({
            content: `<div style="padding: 10px; font-family: Arial;"><strong>${zone.name}</strong><br><small>Delivery: ৳${zone.delivery_charge}</small><br><small style="color: #666;">Area: ${zone.radius}m radius</small></div>`
        });
        
        circle.addListener('click', (e) => {
            // Close all other info windows
            infoWindows.forEach(iw => iw.close());
            infoWindow.setPosition({lat: zone.latitude, lng: zone.longitude});
            infoWindow.open(map);
            
            // Also handle location selection when clicking on zone
            selectLocationFromMapClick(e.latLng);
        });
        
        zoneCircles.push(circle);
        infoWindows.push(infoWindow);
    });
    
    showStatus('📍 Click anywhere on the map to select your delivery location', 'info');
}

function checkLocation() {
    if (!navigator.geolocation) {
        showStatus('⚠️ Geolocation not supported. Use manual location selection on the map.', 'warning');
        return;
    }
    
    showStatus('📍 Requesting your location...', 'info');
    
    navigator.geolocation.getCurrentPosition(
        position => {
            const {latitude, longitude} = position.coords;
            updateMap(latitude, longitude);
            checkServiceZone(latitude, longitude);
        },
        error => {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    showStatus('❌ Location permission denied. You can still select location by clicking on the map.', 'warning');
                    break;
                case error.POSITION_UNAVAILABLE:
                    showStatus('❌ Location unavailable. Click on the map to select your location.', 'warning');
                    break;
                case error.TIMEOUT:
                    showStatus('❌ Location request timeout. Click on the map to select your location.', 'warning');
                    break;
                default:
                    showStatus('❌ Error getting location. Click on the map to select your location.', 'warning');
            }
            console.error('Geolocation error:', error);
        },
        {enableHighAccuracy: false, timeout: 8000, maximumAge: 300000}
    );
}

function updateMap(lat, lng) {
    const userLocation = {lat, lng};
    
    if (userMarker) userMarker.setMap(null);
    
    userMarker = new google.maps.Marker({
        map: map,
        position: userLocation,
        title: 'Your Location',
        icon: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'
    });
    
    map.setCenter(userLocation);
}

function checkServiceZone(latitude, longitude) {
    const payload = JSON.stringify({latitude, longitude});
    
    fetch('/api/check-location/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: payload
    })
    .then(res => res.json())
    .then(data => {
        if (data.is_in_service) {
            const zone = data.zones.find(z => z.is_inside);
            showStatus(`✅ You are in <strong>${zone.zone_name}</strong> zone! Delivery: ৳${zone.delivery_charge}`, 'success');
        } else {
            showStatus('❌ Outside all service zones', 'warning');
        }
    })
    .catch(err => console.error('Error checking location:', err));
}

function showStatus(message, type = 'info') {
    const panel = document.getElementById('statusPanel');
    let alertClass = `alert-${type}`;
    
    panel.innerHTML = `
        <div class="alert ${alertClass} mb-0">
            <div style="font-size: 14px; line-height: 1.5;">${message}</div>
        </div>
        <hr class="my-2">
        <div style="display: flex; gap: 8px; flex-direction: column;">
            <button class="btn btn-sm btn-primary w-100" onclick="checkLocation()">
                <i class="fas fa-location-arrow"></i> Get My Location
            </button>
            <small class="text-muted text-center">Or click on the map to select location</small>
        </div>
    `;
}

window.addEventListener('load', function() {
    // Check if Google Maps API loaded
    if (typeof google === 'undefined' || !google.maps) {
        const statusPanel = document.getElementById('statusPanel');
        if (statusPanel) {
            statusPanel.innerHTML = `
                <div class="alert alert-danger mb-0">
                    <strong>❌ Google Maps Error</strong>
                    <p class="mb-0 mt-2">Failed to load Google Maps. Please check your internet connection or API key configuration.</p>
                </div>
            `;
        }
        return;
    }
    
    initMap();
});

// Fallback initialization if window load doesn't work
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof google !== 'undefined' && google.maps) {
            // Map will be initialized when window loads
        }
    });
}
</script>

<style>
    @media (max-width: 576px) {
        #statusPanel {
            bottom: 10px !important;
            right: 10px !important;
            left: 10px !important;
            width: auto !important;
            min-width: auto !important;
        }
    }
</style>
{% endblock %}
