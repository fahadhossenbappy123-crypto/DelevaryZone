<style>
    /* Manager Sidebar Desktop Styles */
    .manager-sidebar {
        background: linear-gradient(180deg, #52C77B 0%, #3DA670 100%);
        color: white;
        min-height: 100vh;
        padding: 20px 0;
        position: sticky;
        top: 0;
        visibility: visible;
        opacity: 1;
    }

    .sidebar-header {
        padding: 20px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
        text-align: center;
        position: relative;
        visibility: visible;
    }

    .manager-sidebar h5 {
        font-weight: 700;
        margin: 0;
        font-size: 1.3rem;
        color: white;
        visibility: visible;
    }

    .zone-info {
        color: rgba(255, 255, 255, 0.8);
        margin-top: 8px;
        font-size: 0.95rem;
        visibility: visible;
    }

    .manager-sidebar .nav-link {
        color: rgba(255, 255, 255, 0.9);
        padding: 14px 18px;
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.1rem;
        visibility: visible;
    }

    .manager-sidebar .nav-link:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-left-color: white;
        padding-left: 20px;
    }

    .manager-sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-left-color: white;
        font-weight: 600;
    }

    .manager-sidebar .nav-link i {
        width: 24px;
        text-align: center;
        font-size: 1.15rem;
        color: white;
    }

    .manager-sidebar .nav-link span {
        color: white;
        display: block;
        visibility: visible;
    }

    .sidebar-section-title {
        padding: 10px 18px;
        font-size: 0.75rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 8px;
        visibility: visible;
    }

    .sidebar-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 12px 0;
    }

    .manager-sidebar .nav {
        visibility: visible;
        opacity: 1;
    }

    .manager-sidebar-close {
        display: none;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        font-size: 1.3rem;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 6px;
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 1001;
        transition: all 0.3s ease;
        visibility: visible;
    }

    .manager-sidebar-close:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(90deg);
    }

    /* Mobile Responsive Styles */
    @media (max-width: 991px) {
        #managerSidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 0;
            margin: 0;
            min-height: auto;
            visibility: visible;
        }

        #managerSidebar.show {
            left: 0;
            visibility: visible;
        }

        .manager-sidebar {
            position: relative;
            min-height: 100vh;
            padding: 15px 0;
            overflow-y: auto;
            width: 100%;
            visibility: visible;
            opacity: 1;
        }

        .manager-sidebar-close {
            display: block;
            visibility: visible;
        }

        .sidebar-header {
            padding: 15px;
            margin-bottom: 15px;
            visibility: visible;
        }

        .manager-sidebar h5 {
            font-size: 1.25rem;
            visibility: visible;
        }

        .zone-info {
            font-size: 0.9rem;
            visibility: visible;
        }

        .manager-sidebar .nav {
            visibility: visible;
            opacity: 1;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px;
        }

        .manager-sidebar .nav-link {
            padding: 10px 12px;
            font-size: 0.9rem;
            visibility: visible;
            color: white;
            flex: 1;
            min-width: 100px;
            text-align: center;
            white-space: nowrap;
            border-left: none;
        }

        .manager-sidebar .nav-link:hover {
            padding-left: 12px;
            background: rgba(255, 255, 255, 0.25);
        }

        .sidebar-section-title {
            padding: 8px 16px;
            font-size: 0.7rem;
            visibility: visible;
            width: 100%;
        }

        .sidebar-divider {
            width: 100%;
            margin: 8px 0;
        }
    }
</style>

<div class="manager-sidebar">
    <!-- Mobile Close Button -->
    <button class="manager-sidebar-close" id="managerSidebarClose" title="বন্ধ করুন">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Header -->
    <div class="sidebar-header">
        <h5><i class="fas fa-cogs"></i> ম্যানেজার প্যানেল</h5>
        <div class="zone-info">
            <i class="fas fa-map-marker-alt"></i> 
            {% if manager.zone_assigned %}
                {{ manager.zone_assigned.name }}
            {% else %}
                <span class="badge bg-danger">জোন নির্ধারিত নয়</span>
            {% endif %}
        </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav flex-column">
        <!-- Dashboard -->
        <a href="{% url 'manager_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'manager_dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i>
            <span>ড্যাশবোর্ড</span>
        </a>

        <!-- Divider -->
        <div class="sidebar-divider"></div>

        <!-- Section Title -->
        <div class="sidebar-section-title">ডেলিভারি ম্যানেজমেন্ট</div>

        <!-- Riders Management -->
        <a href="{% url 'manager_riders' %}" class="nav-link {% if request.resolver_match.url_name == 'manager_riders' %}active{% endif %}">
            <i class="fas fa-motorcycle"></i>
            <span>রাইডার ম্যানেজমেন্ট</span>
        </a>

        <!-- Divider -->
        <div class="sidebar-divider"></div>

        <!-- Section Title -->
        <div class="sidebar-section-title">জোন পরিচালনা</div>

        <!-- Products -->
        <a href="{% url 'manager_products' %}" class="nav-link {% if 'manager_product' in request.resolver_match.url_name %}active{% endif %}">
            <i class="fas fa-shopping-bag"></i>
            <span>পণ্য</span>
        </a>

        <!-- Categories -->
        <a href="{% url 'manager_categories' %}" class="nav-link {% if 'manager_categor' in request.resolver_match.url_name %}active{% endif %}">
            <i class="fas fa-layer-group"></i>
            <span>ক্যাটেগরি</span>
        </a>

        <!-- Divider -->
        <div class="sidebar-divider"></div>

        <!-- Back to Home -->
        <a href="{% url 'home' %}" class="nav-link">
            <i class="fas fa-arrow-left"></i>
            <span>ওয়েবসাইটে ফিরুন</span>
        </a>
    </nav>
</div>
