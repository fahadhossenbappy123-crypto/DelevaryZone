<style>
    /* Rider Sidebar Desktop Styles */
    .rider-sidebar {
        background: linear-gradient(180deg, #ff6b6b 0%, #ff8787 100%);
        color: white;
        min-height: 100vh;
        padding: 20px 0;
        position: sticky;
        top: 0;
        visibility: visible;
        opacity: 1;
    }

    .rider-sidebar .sidebar-header {
        padding: 20px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
        text-align: center;
        position: relative;
        visibility: visible;
    }

    .rider-sidebar h5 {
        font-weight: 700;
        margin: 0;
        font-size: 1.3rem;
        color: white;
        visibility: visible;
    }

    .rider-zone-info {
        color: rgba(255, 255, 255, 0.8);
        margin-top: 8px;
        font-size: 0.95rem;
        visibility: visible;
    }

    .rider-sidebar .nav-link {
        color: rgba(255, 255, 255, 0.9);
        padding: 14px 18px;
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.1rem;
        visibility: visible;
    }

    .rider-sidebar .nav-link:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-left-color: white;
        padding-left: 20px;
    }

    .rider-sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-left-color: white;
        font-weight: 600;
    }

    .rider-sidebar .nav-link i {
        width: 24px;
        text-align: center;
        font-size: 1.15rem;
        color: white;
    }

    .rider-sidebar .nav-link span {
        color: white;
        display: block;
        visibility: visible;
    }

    .rider-sidebar-section-title {
        padding: 10px 18px;
        font-size: 0.75rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 8px;
        visibility: visible;
    }

    .rider-sidebar-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 12px 0;
    }

    .rider-sidebar-close {
        display: none;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        font-size: 1.3rem;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 6px;
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 1001;
        transition: all 0.3s ease;
        visibility: visible;
    }

    .rider-sidebar-close:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(90deg);
    }

    .rider-sidebar .nav {
        visibility: visible;
        opacity: 1;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 991px) {
        #riderSidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 0;
            margin: 0;
            min-height: auto;
            visibility: visible;
        }

        #riderSidebar.show {
            left: 0;
            visibility: visible;
        }

        .rider-sidebar {
            position: relative;
            min-height: 100vh;
            padding: 15px 0;
            overflow-y: auto;
            width: 100%;
            visibility: visible;
            opacity: 1;
        }

        .rider-sidebar-close {
            display: block;
            visibility: visible;
        }

        .rider-sidebar .sidebar-header {
            padding: 15px;
            margin-bottom: 15px;
            visibility: visible;
        }

        .rider-sidebar h5 {
            font-size: 1.25rem;
            visibility: visible;
        }

        .rider-zone-info {
            font-size: 0.9rem;
            visibility: visible;
        }

        .rider-sidebar .nav {
            visibility: visible;
            opacity: 1;
        }

        .rider-sidebar .nav-link {
            padding: 12px 16px;
            font-size: 1rem;
            visibility: visible;
            color: white;
        }

        .rider-sidebar .nav-link:hover {
            padding-left: 18px;
        }

        .rider-sidebar .nav-link i {
            font-size: 1rem;
            width: 22px;
            color: white;
        }

        .rider-sidebar-section-title {
            padding: 8px 16px;
            font-size: 0.7rem;
            visibility: visible;
        }
    }
</style>

<div class="rider-sidebar">
    <!-- Mobile Close Button -->
    <button class="rider-sidebar-close" id="riderSidebarClose" title="বন্ধ করুন">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Header -->
    <div class="sidebar-header">
        <h5><i class="fas fa-motorcycle"></i> Rider Panel</h5>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav flex-column">
        <!-- Map View -->
        <a href="{% url 'rider_dashboard' %}#map" class="nav-link">
            <i class="fas fa-map"></i>
            <span>ম্যাপ ভিউ</span>
        </a>

        <!-- Available Orders -->
        <a href="{% url 'rider_dashboard' %}#available" class="nav-link">
            <i class="fas fa-list-check"></i>
            <span>উপলব্ধ অর্ডার</span>
        </a>

        <!-- Rider Dashboard CENTER -->
        <a href="{% url 'rider_dashboard' %}" class="nav-link" style="background: rgba(255,255,255,0.2); border-left: 3px solid white; font-weight: 700;">
            <i class="fas fa-motorcycle"></i>
            <span>Rider</span>
        </a>

        <!-- Active Deliveries -->
        <a href="{% url 'rider_dashboard' %}#active" class="nav-link">
            <i class="fas fa-truck"></i>
            <span>সক্রিয় ডেলিভারি</span>
        </a>

        <!-- Completed Orders -->
        <a href="{% url 'rider_dashboard' %}#completed" class="nav-link">
            <i class="fas fa-history"></i>
            <span>সম্পন্ন অর্ডার</span>
        </a>

        <!-- Divider -->
        <div class="rider-sidebar-divider"></div>

        <!-- Profile -->
        <a href="{% url 'profile' %}" class="nav-link">
            <i class="fas fa-user-circle"></i>
            <span>প্রোফাইল</span>
        </a>
    </nav>
</div>
