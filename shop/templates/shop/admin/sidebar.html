<style>
    .admin-sidebar {
        background: linear-gradient(180deg, #52C77B 0%, #3DA670 100%);
        color: white;
        min-height: 100vh;
        padding: 20px 0;
        position: sticky;
        top: 0;
    }

    .admin-sidebar .sidebar-header {
        padding: 20px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
        text-align: center;
    }

    .admin-sidebar h5 {
        font-weight: bold;
        margin: 0;
    }

    .admin-sidebar .nav-link {
        color: rgba(255, 255, 255, 0.85);
        padding: 12px 20px;
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .admin-sidebar .nav-link:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border-left-color: rgba(255, 255, 255, 0.5);
    }

    .admin-sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-left-color: white;
        font-weight: bold;
    }

    .admin-sidebar .nav-link i {
        width: 20px;
        text-align: center;
    }

    .admin-sidebar .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
        margin: 15px 0;
    }
</style>

<div class="admin-sidebar">
    <div class="sidebar-header">
        <h5><i class="fas fa-tachometer-alt"></i> Admin Panel</h5>
    </div>

    <nav class="nav flex-column">
        <!-- Dashboard -->
        <a href="{% url 'admin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> ড্যাশবোর্ড
        </a>

        <div class="divider"></div>

        <!-- Management Section -->
        <div style="padding: 0 20px; font-size: 0.85rem; font-weight: bold; color: rgba(255, 255, 255, 0.6); text-transform: uppercase;">ব্যবস্থাপনা</div>

        <!-- All Users -->
        <a href="{% url 'admin_users' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_users' %}active{% endif %}">
            <i class="fas fa-users"></i> সব ব্যবহারকারী
        </a>

        <!-- Select Zone -->
        <a href="{% url 'admin_zones' %}" class="nav-link {% if 'admin_zone' in request.resolver_match.url_name %}active{% endif %}">
            <i class="fas fa-map-marker-alt"></i> জোন নির্বাচন
        </a>

        <!-- Hero Slides -->
        <a href="{% url 'admin_hero_slides' %}" class="nav-link {% if 'admin_hero_slide' in request.resolver_match.url_name %}active{% endif %}">
            <i class="fas fa-images"></i> Hero Slides
        </a>

        <!-- Manage Role (same as users page) -->
        <a href="{% url 'admin_users' %}?manage_role=1" class="nav-link">
            <i class="fas fa-user-shield"></i> ভূমিকা পরিচালনা
        </a>

        <div class="divider"></div>

        <!-- Home Link -->
        <a href="{% url 'home' %}" class="nav-link">
            <i class="fas fa-arrow-left"></i> ওয়েবসাইটে ফিরুন
        </a>
    </nav>
</div>
