<style>
    /* Admin Sidebar Desktop Styles */
    .admin-sidebar {
        background: linear-gradient(180deg, #52C77B 0%, #3DA670 100%);
        color: white;
        min-height: 100vh;
        padding: 20px 0;
        position: sticky;
        top: 0;
        visibility: visible;
        opacity: 1;
    }

    .admin-sidebar .sidebar-header {
        padding: 20px;
        border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
        text-align: center;
        position: relative;
        visibility: visible;
    }

    .admin-sidebar h5 {
        font-weight: 700;
        margin: 0;
        font-size: 1.3rem;
        color: white;
        visibility: visible;
    }

    .admin-sidebar .nav-link {
        color: rgba(255, 255, 255, 0.9);
        padding: 14px 18px;
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.1rem;
        visibility: visible;
    }

    .admin-sidebar .nav-link:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-left-color: white;
        padding-left: 20px;
    }

    .admin-sidebar .nav-link.active {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border-left-color: white;
        font-weight: 600;
    }

    .admin-sidebar .nav-link i {
        width: 24px;
        text-align: center;
        font-size: 1.15rem;
        color: white;
    }

    .admin-sidebar-section-title {
        padding: 10px 18px;
        font-size: 0.75rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 8px;
        visibility: visible;
    }

    .admin-sidebar-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 12px 0;
    }

    .admin-sidebar-close {
        display: none;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: white;
        font-size: 1.3rem;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 6px;
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 1001;
        transition: all 0.3s ease;
        visibility: visible;
    }

    .admin-sidebar-close:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(90deg);
    }

    .admin-sidebar .nav {
        visibility: visible;
        opacity: 1;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 991px) {
        #adminSidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
            transition: left 0.3s ease;
            padding: 0;
            margin: 0;
            min-height: auto;
            visibility: visible;
        }

        #adminSidebar.show {
            left: 0;
            visibility: visible;
        }

        .admin-sidebar {
            position: relative;
            min-height: 100vh;
            padding: 15px 0;
            overflow-y: auto;
            width: 100%;
            visibility: visible;
            opacity: 1;
        }

        .admin-sidebar-close {
            display: block;
            visibility: visible;
        }

        .admin-sidebar .sidebar-header {
            padding: 15px;
            margin-bottom: 15px;
            visibility: visible;
        }

        .admin-sidebar h5 {
            font-size: 1.25rem;
            visibility: visible;
        }

        .admin-sidebar .nav {
            visibility: visible;
            opacity: 1;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px;
        }

        .admin-sidebar .nav-link {
            padding: 12px 16px;
            font-size: 1rem;
            visibility: visible;
            color: white;
            flex: 1;
            min-width: 100px;
            text-align: center;
            white-space: nowrap;
            border-left: none;
        }

        .admin-sidebar .nav-link:hover {
            padding-left: 16px;
            background: rgba(255, 255, 255, 0.25);
        }

        .admin-sidebar-section-title {
            padding: 8px 16px;
            font-size: 0.7rem;
            visibility: visible;
            width: 100%;
        }

        .admin-sidebar-divider {
            width: 100%;
            margin: 8px 0;
        }
    }
</style>

<div class="admin-sidebar">
    <!-- Mobile Close Button -->
    <button class="admin-sidebar-close" id="adminSidebarClose" title="বন্ধ করুন">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Header -->
    <div class="sidebar-header">
        <h5><i class="fas fa-tachometer-alt"></i> Admin Panel</h5>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav flex-column">
        <!-- Dashboard -->
        <a href="{% url 'admin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i>
            <span>ড্যাশবোর্ড</span>
        </a>

        <!-- Divider -->
        <div class="admin-sidebar-divider"></div>

        <!-- Section Title -->
        <div class="admin-sidebar-section-title">ব্যবস্থাপনা</div>

        <!-- All Users -->
        <a href="{% url 'admin_users' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_users' %}active{% endif %}">
            <i class="fas fa-users"></i>
            <span>সব ব্যবহারকারী</span>
        </a>

        <!-- Select Zone -->
        <a href="{% url 'admin_zones' %}" class="nav-link {% if 'admin_zone' in request.resolver_match.url_name %}active{% endif %}">
            <i class="fas fa-map-marker-alt"></i>
            <span>জোন নির্বাচন</span>
        </a>

        <!-- Hero Slides -->
        <a href="{% url 'admin_hero_slides' %}" class="nav-link {% if 'admin_hero_slide' in request.resolver_match.url_name %}active{% endif %}">
            <i class="fas fa-images"></i>
            <span>Hero Slides</span>
        </a>

        <!-- Manage Role -->
        <a href="{% url 'admin_users' %}?manage_role=1" class="nav-link">
            <i class="fas fa-user-shield"></i>
            <span>ভূমিকা পরিচালনা</span>
        </a>

        <!-- Divider -->
        <div class="admin-sidebar-divider"></div>

        <!-- Home Link -->
        <a href="{% url 'home' %}" class="nav-link">
            <i class="fas fa-arrow-left"></i>
            <span>ওয়েবসাইটে ফিরুন</span>
        </a>
    </nav>
</div>
