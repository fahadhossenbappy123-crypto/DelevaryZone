services:
  - type: web
    name: zonedelivery
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --no-input
    startCommand: gunicorn zonedelivery.wsgi:application --timeout 30 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: '3.10'
      - key: DEBUG
        value: 'False'
      - key: RENDER
        value: 'True'
      - key: DJANGO_SETTINGS_MODULE
        value: 'zonedelivery.settings'
