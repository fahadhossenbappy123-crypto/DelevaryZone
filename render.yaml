services:
  - type: web
    name: zonedelivery
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --no-input
    startCommand: gunicorn zonedelivery.wsgi:application --workers 3 --worker-class sync --timeout 60 --max-requests 1000 --max-requests-jitter 100 --keep-alive 5 --access-logfile - --error-logfile -
    
    envVars:
      - key: PYTHON_VERSION
        value: '3.10'
      - key: DEBUG
        value: 'False'
      - key: RENDER
        value: 'True'
      - key: DJANGO_SETTINGS_MODULE
        value: 'zonedelivery.settings'
      - key: ALLOWED_HOSTS
        value: 'zonedelivery-1.onrender.com,localhost'
      # Add your database URL from Render PostgreSQL
      # Format: postgresql://user:password@host/database
      # - key: DATABASE_URL
      #   value: 'your-database-url-here'
      
      # Or add individual database variables:
      # - key: DB_ENGINE
      #   value: 'django.db.backends.postgresql'
      # - key: DB_NAME
      #   value: 'your_db_name'
      # - key: DB_USER
      #   value: 'your_db_user'
      # - key: DB_PASSWORD
      #   value: 'your_db_password'
      # - key: DB_HOST
      #   value: 'your_db_host'
      # - key: DB_PORT
      #   value: '5432'
