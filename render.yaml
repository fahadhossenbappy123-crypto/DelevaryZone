services:
  - type: web
    name: zonedelivery
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --no-input
    startCommand: gunicorn zonedelivery.wsgi:application --workers 3 --worker-class sync --timeout 60 --max-requests 1000 --max-requests-jitter 100 --keep-alive 5 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: '3.10'
      - key: DEBUG
        value: 'False'
      - key: RENDER
        value: 'True'
      - key: DJANGO_SETTINGS_MODULE
        value: 'zonedelivery.settings'
      - key: ALLOWED_HOSTS
        value: 'delevaryzone-1.onrender.com,localhost,127.0.0.1'
