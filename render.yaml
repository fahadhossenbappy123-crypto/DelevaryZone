services:
  - type: web
    name: zonedelivery
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --no-input
    startCommand: gunicorn zonedelivery.wsgi:application --timeout 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: 'zonedelivery.onrender.com'
